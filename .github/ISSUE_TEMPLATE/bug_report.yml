name: Bug Report
description: Report a bug in the BookOrbit KOReader plugin
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open KOReader
        2. Go to ...
        3. Trigger ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Your setup
      placeholder: |
        - Plugin version/commit:
        - KOReader version:
        - Device/platform: Kobo / Kindle / Android / Linux
        - BookOrbit server version:
        - BookOrbit URL type: LAN / public domain / reverse proxy
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: Paste only relevant logs. Please remove credentials or tokens.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag and drop screenshots here if applicable.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I've searched existing issues and this has not been reported yet.
          required: true
